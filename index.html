<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhoomi Special Message</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:30px;
}

.logo{
font-size:70px;
font-weight:bold;
margin-bottom:30px;
}

.logo span:nth-child(1){color:#4285F4;}
.logo span:nth-child(2){color:#EA4335;}
.logo span:nth-child(3){color:#FBBC05;}
.logo span:nth-child(4){color:#34A853;}

.search-box{
width:80%;
max-width:800px;
padding:18px;
border:1px solid #ddd;
border-radius:30px;
font-size:24px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
outline:none;
}

.loading{
margin-top:20px;
font-size:22px;
color:#666;
}

.hidden{
display:none;
}

.chat{
max-width:700px;
text-align:left;
}

.bubble{
background:#f1f3f4;
padding:15px 20px;
border-radius:20px;
margin:12px 0;
font-size:22px;
animation:fadeIn .7s ease;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>
<body>

<div class="screen" id="searchScreen">
<div class="logo">
<span>G</span><span>o</span><span>o</span><span>gle</span>
</div>

<input class="search-box" id="search" readonly>

</div>

let idx=0;

function showMessage(){
document.getElementById("searchScreen").classList.add("hidden");

let interval=setInterval(()=>{
if(idx<messages.length){

</html>
